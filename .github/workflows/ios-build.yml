name: TrollStore Unsigned Compilation

on:
  workflow_dispatch:

jobs:
  compile:
    runs-on: macos-latest
    steps:
    - name: Checkout Code
      uses: actions/checkout@v4

    - name: Set Xcode version
      uses: maxim-lobanov/setup-xcode@v1
      with:
        xcode-version: 'latest-stable'

    - name: Build App Binary
      run: |
        xcodebuild clean build \
          -project Roaster.xcodeproj \
          -scheme Roaster \
          -configuration Release \
          -sdk iphoneos \
          CODE_SIGNING_ALLOWED=NO \
          CODE_SIGNING_REQUIRED=NO \
          CODE_SIGN_IDENTITY=""

    - name: Package Payload for TrollStore
      run: |
        mkdir -p build/Payload
        cp -r build/Release-iphoneos/Roaster.app build/Payload/
        cd build
        zip -r Roaster.ipa Payload

    - name: Upload Finished Artifact
      uses: actions/upload-artifact@v4
      with:
        name: Roaster-Unsigned
        path: build/Roaster.ipa
