name: TrollStore Native Build Pipeline

on:
  workflow_dispatch:

jobs:
  compile:
    runs-on: macos-latest
    steps:
    - name: Checkout Repository Code
      uses: actions/checkout@v4

    - name: Set Xcode Environment
      uses: maxim-lobanov/setup-xcode@v1
      with:
        xcode-version: 'latest-stable'

    - name: Install Project Generator
      run: brew install xcodegen

    - name: Generate Clean Project File with Schemes
      run: xcodegen generate

    - name: Compile App Binary Raw
      run: |
        xcodebuild clean build \
          -project Roaster.xcodeproj \
          -scheme Roaster \
          -configuration Release \
          -sdk iphoneos \
          CODE_SIGNING_ALLOWED=NO \
          CODE_SIGNING_REQUIRED=NO \
          CODE_SIGN_IDENTITY=""

    - name: Package Payload for TrollStore
      run: |
        mkdir -p build/Payload
        cp -r build/Release-iphoneos/Roaster.app build/Payload/
        cd build
        zip -r Roaster.ipa Payload

    - name: Save Unsigned TrollStore Package
      uses: actions/upload-artifact@v4
      with:
        name: Roaster-TrollStore
        path: build/Roaster.ipa
